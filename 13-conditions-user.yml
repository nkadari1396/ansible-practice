- name : check the user
  hosts: web
  become: yes
  tasks:
  - name: check the user
    ansible.builtin.command: id expense
    register: USER 
    ignore_errors: True
  
  - name: print the user information
    ansible.builtin.debug:
      msg: "user info {{USER}}"

  - name: creat user
    ansible.builtin.command: useradd expense
    when: USER.rc != 0


