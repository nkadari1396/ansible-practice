- name: install package
  hosts: local
  become: yes
  tasks:
  - name: install package
    ansible.builtin.package:
      name: "{{item.name}}"
      state: "{{present.name}}"
  loop:
    - { name: 'mysql', state: 'present' }
    - { name: 'nginx', state: 'absent' }
    - { name: 'postfix', state: 'absent' }
    - { name: 'nginx', state: 'present' }